name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ---------------- Get code ----------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------- Python setup ----------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ---------------- System dependencies ----------------
    - name: Install system packages
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk wget \
        autoconf automake libtool pkg-config

    # ---------------- Python packages ----------------
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy

    # ---------------- Create Buildozer spec ----------------
    - name: Init Buildozer
      run: |
        buildozer init

    # ---------------- Fix requirements ----------------
    - name: Fix buildozer.spec
      run: |
        sed -i 's/^requirements =.*/requirements = python3,kivy/' buildozer.spec

    # ---------------- FORCE FIX AIDL ISSUE ----------------
    - name: Pre-install Android build-tools (FIX AIDL)
      run: |
        mkdir -p ~/.buildozer/android/platform
        cd ~/.buildozer/android/platform

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip commandlinetools-linux-11076708_latest.zip

        mkdir -p android-sdk/cmdline-tools/latest
        mv cmdline-tools/* android-sdk/cmdline-tools/latest/

        yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
        "platform-tools" \
        "platforms;android-33" \
        "build-tools;33.0.2"

    # ---------------- Build APK ----------------
    - name: Build APK
      run: |
        buildozer -v android debug

    # ---------------- Upload APK ----------------
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
