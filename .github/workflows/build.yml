name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ---------------- Checkout code ----------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------- Setup Python ----------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ---------------- System dependencies ----------------
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk wget \
        autoconf automake libtool pkg-config

    # ---------------- Python dependencies ----------------
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy

    # ---------------- Init Buildozer ----------------
    - name: Initialize Buildozer
      run: |
        buildozer init

    # ---------------- Fix buildozer spec ----------------
    - name: Fix buildozer requirements
      run: |
        sed -i 's/^requirements =.*/requirements = python3,kivy/' buildozer.spec

    # ---------------- Fix Android SDK (AIDL fix) ----------------
    - name: Install Android SDK components (fix AIDL)
      run: |
        mkdir -p $HOME/.buildozer/android/platform
        cd $HOME/.buildozer/android/platform

        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
        unzip cmdline-tools.zip

        mkdir -p android-sdk/cmdline-tools/latest
        mv cmdline-tools/* android-sdk/cmdline-tools/latest/

        echo "ANDROIDSDK=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV

    # ---------------- Build APK ----------------
    - name: Build APK
      run: |
        buildozer -v android debug

    # ---------------- Upload APK ----------------
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
