name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ---------------- Checkout code ----------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ---------------- Setup Python ----------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # ---------------- Install system dependencies ----------------
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk wget \
        autoconf automake libtool pkg-config

    # ---------------- Install Buildozer & Python deps ----------------
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy

    # ---------------- Initialize Buildozer ----------------
    - name: Initialize Buildozer
      run: |
        buildozer init

    # ---------------- Fix buildozer requirements ----------------
    - name: Fix buildozer.spec
      run: |
        sed -i 's/^requirements =.*/requirements = python3,kivy/' buildozer.spec

    # ---------------- Build APK (Buildozer handles SDK automatically) ----------------
    - name: Build Android APK
      run: |
        buildozer -v android debug

    # ---------------- Upload APK ----------------
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
