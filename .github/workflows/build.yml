name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk wget \
        autoconf automake libtool pkg-config

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Init Buildozer
      run: buildozer init

    - name: Fix requirements
      run: |
        sed -i 's/^requirements =.*/requirements = python3,kivy/' buildozer.spec

    # IMPORTANT FIX: force correct Android API + build tools
    - name: Fix Android config
      run: |
        sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec || true
        sed -i 's/^android.minapi =.*/android.minapi = 21/' buildozer.spec || true

    - name: Build APK
      run: buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk
